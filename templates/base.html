<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Archery Answers{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <div class="header-top">
            <div class="logo">
                <h1>Archery Answers</h1>
                <p class="tagline">Bowhunting Ballistics & Arrow Building</p>
            </div>
            <div class="auth-links">
                {% if user.is_authenticated %}
                    <span class="welcome">{{ user.username }}</span>
                    <a href="{% url 'accounts:logout' %}" class="auth-btn">Log Out</a>
                {% else %}
                    <a href="{% url 'accounts:login' %}" class="auth-btn">Log In</a>
                    <a href="{% url 'accounts:register' %}" class="auth-btn register">Register</a>
                {% endif %}
            </div>
        </div>
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="speed-calc">Arrow Speed</button>
            <button class="tab-btn" data-tab="ke-calc">KE & Momentum</button>
            <button class="tab-btn" data-tab="animal-chart">Animal Reference</button>
            <button class="tab-btn" data-tab="faq">FAQ</button>
            {% if user.is_authenticated %}
            <button class="tab-btn" data-tab="submit-component">Submit Component</button>
            <a href="{% url 'builder:home' %}" class="tab-btn">Arrow Builder</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
